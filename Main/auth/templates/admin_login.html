<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Attendeez</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Attendeez</h1>
            <p class="auth-subtitle">Administrative Access</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.admin_login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Administrator" autocomplete="username">
            </div>
            <div class="form-group">
                <div class="flex justify-between items-center mb-2">
                    <label class="form-label" style="margin: 0;">Password</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-sm" style="color: var(--primary);">Forgot?</a>
                </div>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-danger w-full mt-4">Login System</button>
        </form>
        
        <div class="mt-8 pt-6" style="border-top: 1px solid var(--border-color); text-align: center;">
            <a href="{{ url_for('auth.student_login') }}" class="btn btn-secondary w-full">
                <i class="fas fa-arrow-left"></i> Return to Portal
            </a>
        </div>
    </div>
</body>
</html>
