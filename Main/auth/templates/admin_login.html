<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Attendeez</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-login">
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="role-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1>Attendeez</h1>
                <p>Admin Portal</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.admin_login') }}">
                <div class="form-group">
                    <label class="form-label">Admin Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="form-group" style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
                    <a href="{{ url_for('auth.forgot_password') }}" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid var(--surface-border); color: var(--text-secondary);">
                        <i class="fas fa-user-lock"></i> Forgot Password?
                    </a>
                </div>
                <button type="submit" class="btn btn-danger w-100">Login as Admin</button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="{{ url_for('auth.student_login') }}" class="btn btn-secondary w-100" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <i class="fas fa-arrow-left"></i> Back to Student Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
