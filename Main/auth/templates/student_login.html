<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Attendeez</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h1 class="auth-title">Attendeez</h1>
            <p class="auth-subtitle">Student Portal Access</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.student_login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label class="form-label">Student ID</label>
                <div class="input-with-icon">
                    <i class="fas fa-id-card"></i>
                    <input type="text" name="email" class="form-control" required placeholder="e.g. S-2024-001" autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <div class="flex justify-between items-center mb-2">
                    <label class="form-label" style="margin: 0;">Password</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-sm auth-link">Forgot?</a>
                </div>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full mt-6 auth-btn">Sign In as Student</button>
        </form>
        
        <div class="auth-footer">
            <p class="text-muted text-sm mb-4">Other Access Portals</p>
            <div class="auth-links">
                <a href="{{ url_for('auth.teacher_login') }}" class="btn btn-secondary flex-1">
                    <i class="fas fa-chalkboard-teacher"></i> Faculty
                </a>
                <a href="{{ url_for('auth.admin_login') }}" class="btn btn-secondary flex-1">
                    <i class="fas fa-shield-halved"></i> Admin
                </a>
            </div>
        </div>
    </div>
</body>
</html>
