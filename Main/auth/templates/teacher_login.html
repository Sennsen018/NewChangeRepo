<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login | Attendeez</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="teacher-login">
    <!-- Fixed Admin Button in Upper Left Corner -->
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-danger" 
       style="position: fixed; top: 20px; left: 20px; z-index: 1000; padding: 0.6rem 1rem; font-size: 0.8rem; border-radius: 8px; opacity: 0.8; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); transition: all 0.3s ease;"
       onmouseover="this.style.opacity='1'; this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 20px rgba(239, 68, 68, 0.5)'"
       onmouseout="this.style.opacity='0.8'; this.style.transform='scale(1)'; this.style.boxShadow='0 0 15px rgba(239, 68, 68, 0.3)'">
        <i class="fas fa-user-shield"></i> Admin Portal
    </a>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="role-icon">
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
                <h1>Attendeez</h1>
                <p>Faculty Portal</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.teacher_login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-id-badge" style="margin-right:6px;"></i>Teacher ID</label>
                    <input type="text" name="email" class="form-control" required placeholder="e.g. T-2024-001" autocomplete="off" maxlength="10">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••" maxlength="128">
                </div>
                <div class="form-group" style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
                    <a href="{{ url_for('auth.forgot_password') }}" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid var(--surface-border); color: var(--text-secondary);">
                        <i class="fas fa-key"></i> Forgot Password?
                    </a>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login as Teacher</button>
            </form>
            
            <div class="text-center mt-4 pt-4" style="border-top: 1px solid var(--surface-border)">
                <p style="margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.9rem;">Are you a student?</p>
                <a href="{{ url_for('auth.student_login') }}" class="btn btn-secondary w-100">Go to Student Login</a>
            </div>
        </div>
    </div>
</body>
</html>
